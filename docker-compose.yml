services:
  # Base de Datos
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: pedidos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # API Backend
  backend:
    build: ./backend
    ports:
      - "4000:3000" # Acceso local en puerto 4000
    environment:
      DB_HOST: db
      DB_USER: admin
      DB_PASSWORD: password123
      DB_NAME: pedidos_db
    depends_on:
      - db

  # App Frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:3000" # Acceso local en puerto 3000
    stdin_open: true # Necesario para React en Docker
    depends_on:
      - backend

volumes:
  postgres_data: